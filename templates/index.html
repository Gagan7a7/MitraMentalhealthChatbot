<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Health Chatbot</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Animated background particles */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(255,255,255,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 40% 40%, rgba(255,255,255,0.05) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        .container {
            width: 100%;
            max-width: 420px;
            height: 700px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 0 0 1px rgba(255,255,255,0.2);
            overflow: hidden;
            position: relative;
            animation: slideUp 0.8s ease-out;
            border: 1px solid rgba(255,255,255,0.3);
            display: flex;
            flex-direction: column;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
            color: white;
            padding: 25px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .header-content {
            position: relative;
            z-index: 2;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header-subtitle {
            font-size: 13px;
            opacity: 0.9;
            font-weight: 300;
            margin-bottom: 5px;
        }

        #clock {
            font-size: 12px;
            opacity: 0.8;
            font-weight: 400;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            font-size: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .msger-chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: linear-gradient(180deg, #fafafa 0%, #f8fafc 100%);
            position: relative;
        }

        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: #64748b;
            animation: fadeIn 1s ease-out 0.5s both;
        }

        .welcome-message .bot-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg {
            display: flex;
            align-items: flex-end;
            margin-bottom: 20px;
            animation: messageSlide 0.5s ease-out;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            margin: 0 12px;
            flex-shrink: 0;
            border: 2px solid rgba(255,255,255,0.5);
        }

        .bot-img {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        .user-img {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        .msg-bubble {
            max-width: 280px;
            padding: 14px 18px;
            border-radius: 20px;
            position: relative;
            line-height: 1.5;
        }

        .left-msg .msg-bubble {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-bottom-left-radius: 6px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }

        .right-msg {
            flex-direction: row-reverse;
        }

        .right-msg .msg-bubble {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 2px 12px rgba(99, 102, 241, 0.3);
        }

        .msg-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .msg-info-name {
            font-weight: 600;
            font-size: 11px;
            opacity: 0.8;
        }

        .msg-info-time {
            font-size: 10px;
            opacity: 0.6;
        }

        .msg-text {
            font-size: 14px;
            font-weight: 400;
        }

        .typing-indicator {
            opacity: 0.8;
        }

        .typing-dots {
            display: flex;
            align-items: center;
            padding: 8px 0;
        }

        .typing-dots span {
            height: 8px;
            width: 8px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1.2); opacity: 1; }
        }

        .quick-responses {
            padding: 16px;
            margin: 0 15px 15px 15px;
            background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(248,250,252,0.9) 100%);
            border-radius: 16px;
            border: 1px solid rgba(226, 232, 240, 0.5);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.8s ease-out;
            text-align: center;
            display: none;
            transition: all 0.3s ease;
        }

        .quick-responses.show {
            display: block;
        }

        .quick-responses.hide {
            display: none;
        }

        .back-to-quick {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 20px;
            padding: 8px 12px;
            font-size: 12px;
            color: #6366f1;
            cursor: pointer;
            display: none;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            font-weight: 500;
        }

        .back-to-quick:hover {
            background: rgba(99, 102, 241, 0.1);
            transform: translateY(-1px);
        }

        .back-to-quick.show {
            display: flex;
        }

        .quick-responses-title {
            font-weight: 600;
            margin-bottom: 12px;
            color: #475569;
            font-size: 13px;
            text-align: center;
        }

        .quick-response-btn {
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            color: #475569;
            border: 1px solid rgba(203, 213, 225, 0.5);
            padding: 10px 16px;
            border-radius: 20px;
            margin: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .quick-response-btn:hover {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .msger-inputarea {
            display: flex;
            padding: 20px;
            background: rgba(255, 255, 255, 0.95);
            border-top: 1px solid rgba(226, 232, 240, 0.5);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }

        .msger-input {
            flex: 1;
            border: 1px solid rgba(203, 213, 225, 0.5);
            border-radius: 25px;
            padding: 14px 20px;
            font-size: 14px;
            outline: none;
            background: rgba(248, 250, 252, 0.8);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .msger-input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            background: rgba(255, 255, 255, 0.95);
        }

        .msger-send-btn {
            margin-left: 12px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .msger-send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .msger-send-btn:active {
            transform: scale(0.95);
        }

        /* Loading animation */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeOut 2s ease-out 3s forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* Scrollbar styling */
        .msger-chat::-webkit-scrollbar {
            width: 6px;
        }

        .msger-chat::-webkit-scrollbar-track {
            background: rgba(241, 245, 249, 0.5);
            border-radius: 3px;
        }

        .msger-chat::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #cbd5e1, #94a3b8);
            border-radius: 3px;
        }

        .msger-chat::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #94a3b8, #64748b);
        }

        /* Mobile responsiveness */
        @media (max-width: 480px) {
            .container {
                max-width: 100%;
                height: 100vh;
                border-radius: 0;
                margin: 0;
            }
            
            body {
                padding: 0;
            }
        }

        /* Hidden toggle for chatbot */
        #chatbot_toggle {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Loading Screen -->
        <div class="loading-overlay">
            <div class="loader"></div>
            <div class="loading-text">Initializing your mental health assistant...</div>
        </div>

        <div class="header">
            <div class="header-content">
                <h1>Mitra</h1>
                <div class="header-subtitle">Your AI Wellness Companion</div>
                <div id="clock"></div>
                <div class="status-indicator">
                    <div class="status-dot"></div>
                    <span>AI Assistant Online</span>
                </div>
            </div>
        </div>
        
        <div class="chat-container">
            <div class="msger-chat">
                <div class="back-to-quick" id="back-to-quick">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                    </svg>
                    Quick Help
                </div>
                <div class="welcome-message" id="welcome-message">
                    <div class="bot-avatar">🤖</div>
                    <h3 style="margin-bottom: 10px; color: #475569;">Hello! I'm Mitra, your AI mental health companion</h3>
                    <p>I'm here to listen, support, and help you navigate your mental wellness journey. How are you feeling today?</p>
                </div>
            </div>
            
            <div class="quick-responses" id="quick-responses">
                <div class="quick-responses-title">Quick Start Options</div>
                <button class="quick-response-btn">How are you feeling today?</button>
                <button class="quick-response-btn">I need help with anxiety</button>
                <button class="quick-response-btn">I'm feeling stressed</button>
                <button class="quick-response-btn">Tell me about depression</button>
            </div>
            
            <form class="msger-inputarea">
                <input type="text" class="msger-input" placeholder="Type your message here...">
                <button type="submit" class="msger-send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <!-- Hidden toggle for chatbot (if needed) -->
    <div id="chatbot_toggle" style="display: none;">
        <span>💬</span>
        <span>✖</span>
    </div>

    <script>
        // Clock functionality
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', {
                hour12: true,
                hour: '2-digit',
                minute: '2-digit'
            });
            document.getElementById('clock').textContent = timeString;
        }

        // Update clock every second
        setInterval(updateClock, 1000);
        updateClock(); // Initialize immediately

        // Function to hide welcome message and quick responses after first use
        function startConversation() {
            const welcomeMessage = document.getElementById('welcome-message');
            const quickResponses = document.getElementById('quick-responses');
            const backButton = document.getElementById('back-to-quick');
            
            if (welcomeMessage) {
                welcomeMessage.style.display = 'none';
            }
            if (quickResponses) {
                quickResponses.classList.remove('show');
                quickResponses.classList.add('hide');
            }
            if (backButton) {
                backButton.classList.add('show');
            }
        }

        // Function to show quick responses again
        function showQuickResponses() {
            const quickResponses = document.getElementById('quick-responses');
            const backButton = document.getElementById('back-to-quick');
            
            if (quickResponses) {
                quickResponses.classList.remove('hide');
                quickResponses.classList.add('show');
            }
            if (backButton) {
                backButton.classList.remove('show');
            }
        }

        // Back button functionality
        document.getElementById('back-to-quick').addEventListener('click', function() {
            showQuickResponses();
        });

        // Quick response button functionality
        document.querySelectorAll('.quick-response-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const input = document.querySelector('.msger-input');
                input.value = this.textContent;
                input.focus();
                // Start conversation and hide quick responses
                startConversation();
                // Trigger the form submission to send the message
                document.querySelector('.msger-inputarea').dispatchEvent(new Event('submit'));
            });
        });

        // Monitor for new messages being added to chat (to detect when user sends messages)
        const chatContainer = document.querySelector('.msger-chat');
        if (chatContainer) {
            const observer = new MutationObserver(function(mutations) {
                mutations.forEach(function(mutation) {
                    if (mutation.addedNodes.length > 0) {
                        // Check if it's a message (not the back button or welcome)
                        const hasNewMessage = Array.from(mutation.addedNodes).some(node => 
                            node.classList && node.classList.contains('msg')
                        );
                        if (hasNewMessage) {
                            startConversation();
                        }
                    }
                });
            });
            observer.observe(chatContainer, { childList: true });
        }

        // Remove the loading overlay after bot.js loads
        setTimeout(() => {
            const loadingOverlay = document.querySelector('.loading-overlay');
            if (loadingOverlay) {
                loadingOverlay.style.display = 'none';
            }
        }, 2000);
    </script>
    
    <script src="static/js/bot.js"></script>
</body>
</html>
